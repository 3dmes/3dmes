version: "3.9"

services:
  # Traefik Reverse Proxy
  traefik:
    image: traefik:v3.0
    container_name: 3dmes-traefik
    restart: unless-stopped
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --log.level=INFO
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # HTTP zu HTTPS Weiterleitung
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
    ports:
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "${TRAEFIK_HTTPS_PORT:-443}:443"
      - "${TRAEFIK_DASHBOARD_PORT:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./cert:/cert:ro
    networks:
      - mesnet
    labels:
      - traefik.enable=true
      # Dashboard (ohne Auth für lokale Nutzung)
      - traefik.http.routers.traefik-dashboard.rule=Host(`traefik.localhost`)
      - traefik.http.routers.traefik-dashboard.entrypoints=web
      - traefik.http.routers.traefik-dashboard.service=api@internal

  timescaledb:
    image: timescale/timescaledb:2.23.0-pg16
    container_name: 3dmes-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${TS_DB}
      POSTGRES_USER: ${TS_USER}
      POSTGRES_PASSWORD: ${TS_PASSWORD}
      TIMESCALEDB_TELEMETRY: "off"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    networks:
      - mesnet
    ports:
      - "${TS_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TS_USER:-mesuser} -d ${TS_DB:-mesdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  3dmes:
    image: xhbtec/3dmes:${THREEMES_VERSION:-latest}
    container_name: 3dmes-app
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__DefaultConnection: "Host=timescaledb;Port=5432;Database=${TS_DB};Username=${TS_USER};Password=${TS_PASSWORD}"
      ASPNETCORE_URLS: "http://+:80"
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@local}
      
      # PrintPortal Konfiguration
      PrintPortal__CertificateStoragePath: /app/cert
      PrintPortal__AutoRenewalCheckIntervalHours: 24
    networks:
      - mesnet
    ports:
      # MQTT Ports bleiben direkt erreichbar (nicht über Traefik)
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTTS_PORT:-8883}:8883"
    volumes:
      - uploads:/app/uploads
      - ./cert:/app/cert
      - ./license.jwt:/app/license.jwt:ro
    labels:
      - traefik.enable=true
      
      # HTTP Router (Weiterleitung zu HTTPS)
      - traefik.http.routers.3dmes-http.rule=Host(`${DOMAIN:-localhost}`)
      - traefik.http.routers.3dmes-http.entrypoints=web
      
      # HTTPS Router mit Custom Certificate
      - traefik.http.routers.3dmes-https.rule=Host(`${DOMAIN:-localhost}`)
      - traefik.http.routers.3dmes-https.entrypoints=websecure
      - traefik.http.routers.3dmes-https.tls=true
      - traefik.http.routers.3dmes-https.service=3dmes-service
      
      # Custom Certificate Configuration
      - traefik.http.routers.3dmes-https.tls.certificates.certFile=/cert/certificate.pem
      - traefik.http.routers.3dmes-https.tls.certificates.keyFile=/cert/privatekey.pem
      
      # Service Definition (Port innerhalb des Containers)
      - traefik.http.services.3dmes-service.loadbalancer.server.port=80
      
      # CORS Headers Middleware (optional)
      - traefik.http.middlewares.cors-headers.headers.accesscontrolalloworigin=*
      - traefik.http.middlewares.cors-headers.headers.accesscontrolallowmethods=GET,POST,PUT,DELETE,OPTIONS,PATCH
      - traefik.http.middlewares.cors-headers.headers.accesscontrolallowheaders=Content-Type,Authorization
      - traefik.http.routers.3dmes-https.middlewares=cors-headers

networks:
  mesnet:
    driver: bridge

volumes:
  timescale_data:
  uploads:

