version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: 3dmes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mesdb}
      POSTGRES_USER: ${POSTGRES_USER:-mesuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mespassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mesnet
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mesuser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  3dmes:
    image: xhbtec/3dmes:${THREEMES_VERSION:-latest}
    container_name: 3dmes-app
    user: root
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-mesdb};Username=${POSTGRES_USER:-mesuser};Password=${POSTGRES_PASSWORD:-mespassword}"
      ASPNETCORE_URLS: "http://+:80"
    networks:
      - mesnet
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTTS_PORT:-8883}:8883"
    volumes:
      - uploads:/app/uploads

networks:
  mesnet:
    driver: bridge

volumes:
  postgres_data:
  uploads:

