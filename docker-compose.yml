version: "3.9"

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: 3dmes-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${TS_DB:-mesdb}
      POSTGRES_USER: ${TS_USER:-mesuser}
      POSTGRES_PASSWORD: ${TS_PASSWORD:-mespassword}
      TIMESCALEDB_TELEMETRY: "off"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    networks:
      - mesnet
    ports:
      - "${TS_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TS_USER:-mesuser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  3dmes:
    image: xhbtec/3dmes:${THREEMES_VERSION:-latest}
    container_name: 3dmes-app
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__DefaultConnection: "Host=timescaledb;Port=5432;Database=${TS_DB:-mesdb};Username=${TS_USER:-mesuser};Password=${TS_PASSWORD:-mespassword}"
      ASPNETCORE_URLS: "http://+:80"
    networks:
      - mesnet
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTTS_PORT:-8883}:8883"
    volumes:
      - uploads:/app/uploads

networks:
  mesnet:
    driver: bridge

volumes:
  timescale_data:
  uploads:
